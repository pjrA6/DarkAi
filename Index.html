        * {

        body {

        @keyframes fadeInOut {

            color: #fff;
            padding: 12px;
            border-radius: 8px;

            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 0 5px #b026ff;
            transition: all 0.3s ease;
        }

        button:hover, button:active {
            background: #b026ff;
            box-shadow: 0 0 20px #b026ff;
            transform: translateY(-2px);
        }

        .switch-link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .switch-link span {
            color: #b026ff;
            cursor: pointer;
            font-weight: bold;
            text-shadow: 0 0 3px #b026ff;

            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(176, 38, 255, 0.5);
            padding-bottom: 10px;

        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            color: #b026ff;
            text-shadow: 0 0 5px #b026ff;
            transition: 0.3s;
        }

        .menu-btn:hover {
            transform: scale(1.1);
        }

        .chat-box {
            height: 350px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
            margin-bottom: 15px;
            scrollbar-width: thin;
            scrollbar-color: #b026ff transparent;
        }

        .chat-box::-webkit-scrollbar { width: 5px; }
        .chat-box::-webkit-scrollbar-thumb { background: #b026ff; border-radius: 5px; }

        .message {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeInOut 0.3s ease forwards;
        }

            background: rgba(176, 38, 255, 0.15);
            border: 1px solid #b026ff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

            background: #b026ff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            box-shadow: 0 0 10px rgba(176, 38, 255, 0.5);
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            margin: 0;
        }

        .input-area button {
            margin: 0;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .about-menu {
            position: absolute;
            top: 60px;
            right: 20px;
            background: #14002e;
            border: 1px solid #b026ff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 15px #b026ff;
            font-size: 12px;
            display: none;
            z-index: 100;
            animation: fadeInOut 0.3s ease forwards;
        }

        .about-menu.active {
            display: block;
        }

        .about-menu p {
            margin-bottom: 5px;
            color: #d896ff;
        }

    </style>
</head>
